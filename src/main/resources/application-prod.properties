# Production profile ? active on Render via SPRING_PROFILES_ACTIVE=prod
# Cross-origin cookies require SameSite=None + Secure for Vercel ? Render
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.path=/
server.servlet.session.cookie.max-age=1800

# Set CORS_ALLOWED_ORIGINS env var on Render to your Vercel frontend URL
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://campus-booking-frontend.vercel.app}

# Set APP_SERVER_URL env var on Render to your backend URL (for Swagger UI)
app.server.url=${APP_SERVER_URL:https://cpen421-campus-booking-facility-ms.onrender.com}

spring.application.name=facility-booking-ms

# PostgreSQL (linked Render DB)
# IMPORTANT: Set these on Render environment variables:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://dpg-d6hfin15pdvs73dhbo9g-a.oregon-postgres.render.com:5432/facility_booking_db?sslmode=require
#   SPRING_DATASOURCE_USERNAME=facility_booking_db_user
#   SPRING_DATASOURCE_PASSWORD=FSdblKhih4eJjvOAwsUAuo7Lq8Xp8vJY
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Render dynamically assigns port
server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Disable server compression completely
server.compression.enabled=false

# Session Management
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# Swagger / OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.show-actuator=false


# Jackson Date/Time Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null
management.endpoints.web.exposure.include=health
