<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facilities — Facility Booking</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav id="nav"></nav>

<main>
  <div class="page-header">
    <h1 class="page-title">Facilities</h1>
    <button id="addBtn" class="btn btn-primary" style="display:none" onclick="openAddModal()">+ Add Facility</button>
  </div>

  <!-- Facilities table -->
  <div class="table-wrap" style="margin-bottom:32px">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Location</th>
          <th>Capacity</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>

  <!-- Availability checker -->
  <div class="card">
    <p class="section-title">Check Availability</p>
    <div class="avail-form">
      <div class="form-group">
        <label>Facility</label>
        <select id="avFacility"><option value="">Select…</option></select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="avDate">
      </div>
      <div class="form-group">
        <label>Start time</label>
        <input type="time" id="avStart">
      </div>
      <div class="form-group">
        <label>End time</label>
        <input type="time" id="avEnd">
      </div>
      <button class="btn btn-primary" onclick="checkAvail()">Check</button>
    </div>
    <div id="avResult"></div>
  </div>
</main>

<!-- Add / Edit modal -->
<div class="modal-overlay" id="facModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Add Facility</h3>
      <button class="modal-close" onclick="closeModal('facModal')">×</button>
    </div>
    <div id="facErr" class="alert alert-error" style="display:none"></div>
    <form id="facForm">
      <input type="hidden" id="facId">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="facName" required placeholder="e.g. Main Hall">
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="facLocation" required placeholder="e.g. Block A, Floor 2">
      </div>
      <div class="form-group">
        <label>Capacity</label>
        <input type="number" id="facCapacity" required min="1" placeholder="50">
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button type="button" class="btn btn-outline" onclick="closeModal('facModal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="facSubmit">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  const user = initNav('facilities');
  let facilities = [];

  if (user.role === 'ADMIN') document.getElementById('addBtn').style.display = '';

  async function load() {
    const res = await API.get('/facilities');
    if (!res || !res.ok) { document.getElementById('tbody').innerHTML = '<tr><td colspan="5" class="empty">Failed to load.</td></tr>'; return; }
    facilities = await res.json();
    renderTable();
    renderAvailSelect();
  }

  function renderTable() {
    const tbody = document.getElementById('tbody');
    if (!facilities.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">No facilities found.</td></tr>'; return; }
    tbody.innerHTML = facilities.map(f => `
      <tr>
        <td>${f.id}</td>
        <td>${esc(f.name)}</td>
        <td>${esc(f.location)}</td>
        <td>${f.capacity}</td>
        <td class="actions">
          ${user.role === 'ADMIN'
            ? `<button class="btn btn-sm btn-outline" onclick="openEditModal(${f.id})">Edit</button>
               <button class="btn btn-sm btn-danger"  onclick="deleteFacility(${f.id})">Delete</button>`
            : `<a class="btn btn-sm btn-primary" href="/bookings.html">Book</a>`}
        </td>
      </tr>`).join('');
  }

  function renderAvailSelect() {
    const sel = document.getElementById('avFacility');
    sel.innerHTML = '<option value="">Select…</option>' +
      facilities.map(f => `<option value="${f.id}">${esc(f.name)}</option>`).join('');
  }

  // ── Availability ─────────────────────────────────────────────────────────
  async function checkAvail() {
    const facilityId = document.getElementById('avFacility').value;
    const date       = document.getElementById('avDate').value;
    const startTime  = toApiTime(document.getElementById('avStart').value);
    const endTime    = toApiTime(document.getElementById('avEnd').value);
    const res_el     = document.getElementById('avResult');

    if (!facilityId || !date || !startTime || !endTime) {
      res_el.innerHTML = '<p class="alert alert-error">Please fill all fields.</p>'; return;
    }

    const res = await API.get(`/bookings/availability?facilityId=${facilityId}&date=${date}&startTime=${startTime}&endTime=${endTime}`);
    if (!res) return;
    const available = await res.json();
    res_el.innerHTML = available
      ? `<div class="avail-result avail-yes">✓ Available for booking</div>`
      : `<div class="avail-result avail-no">✗ Not available — slot is taken</div>`;
  }

  // ── Admin: Add ────────────────────────────────────────────────────────────
  function openAddModal() {
    document.getElementById('modalTitle').textContent = 'Add Facility';
    document.getElementById('facId').value = '';
    document.getElementById('facForm').reset();
    document.getElementById('facErr').style.display = 'none';
    document.getElementById('facSubmit').textContent = 'Add';
    openModal('facModal');
  }

  // ── Admin: Edit ───────────────────────────────────────────────────────────
  function openEditModal(id) {
    const f = facilities.find(x => x.id === id);
    if (!f) return;
    document.getElementById('modalTitle').textContent  = 'Edit Facility';
    document.getElementById('facId').value             = f.id;
    document.getElementById('facName').value           = f.name;
    document.getElementById('facLocation').value       = f.location;
    document.getElementById('facCapacity').value       = f.capacity;
    document.getElementById('facErr').style.display    = 'none';
    document.getElementById('facSubmit').textContent   = 'Update';
    openModal('facModal');
  }

  // ── Admin: Delete ─────────────────────────────────────────────────────────
  async function deleteFacility(id) {
    if (!confirm('Delete this facility?')) return;
    const res = await API.del(`/facilities/${id}`);
    if (!res) return;
    if (res.ok) { toast('Facility deleted'); load(); }
    else { toast(await parseError(res), 'error'); }
  }

  // ── Form submit (add / edit) ──────────────────────────────────────────────
  document.getElementById('facForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('facErr');
    err.style.display = 'none';
    const id = document.getElementById('facId').value;
    const payload = {
      name:     document.getElementById('facName').value.trim(),
      location: document.getElementById('facLocation').value.trim(),
      capacity: parseInt(document.getElementById('facCapacity').value, 10)
    };

    const res = id
      ? await API.put(`/facilities/${id}`, payload)
      : await API.post('/facilities', payload);

    if (!res) return;
    if (res.ok) {
      toast(id ? 'Facility updated' : 'Facility added');
      closeModal('facModal');
      load();
    } else {
      err.textContent = await parseError(res);
      err.style.display = 'block';
    }
  });

  load();
</script>
</body>
</html>
