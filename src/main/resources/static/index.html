<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Facility Booking</title></head>
<body>
<script>
  const raw = sessionStorage.getItem('fbms_user');
  if (raw) {
    const u = JSON.parse(raw);
    window.location.href = u.role === 'ADMIN' ? '/admin-dashboard.html' : '/dashboard.html';
  } else {
    window.location.href = '/login.html';
  }
</script>
</body>
</html>
