<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Facility Booking</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your account</p>

  <div id="err" class="alert alert-error" style="display:none"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Sign in</button>
  </form>

  <p class="auth-footer">Don't have an account? <a href="/register.html">Register</a></p>
</div>

<script src="/js/app.js"></script>
<script>
  // Already logged in → skip to dashboard
  if (Auth.get()) window.location.href = '/dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('err');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      // 1. Authenticate
      const res = await fetch('/auth/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      if (!res.ok) {
        throw new Error(await parseError(res));
      }

      const loginData = await res.json();  // { id, email, role, message }

      // 2. Fetch full user profile to get name
      const profileRes = await fetch(`/users/${loginData.id}`, { credentials: 'include' });
      const profile    = profileRes.ok ? await profileRes.json() : {};

      Auth.set({
        id:    loginData.id,
        email: loginData.email,
        role:  loginData.role,
        name:  profile.name || loginData.email
      });

      window.location.href = loginData.role === 'ADMIN' ? '/admin-dashboard.html' : '/dashboard.html';
    } catch (ex) {
      err.textContent  = ex.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
