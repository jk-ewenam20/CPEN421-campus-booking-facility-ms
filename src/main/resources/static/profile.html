<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Facility Booking</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav id="nav"></nav>

<main>
  <div class="page-header">
    <h1 class="page-title">My Profile</h1>
    <button class="btn btn-outline" id="editToggle" onclick="toggleEdit()">Edit profile</button>
  </div>

  <div style="max-width:520px">
    <!-- View mode -->
    <div class="card" id="viewCard">
      <div id="profileFields"></div>
    </div>

    <!-- Edit mode -->
    <div class="card" id="editCard" style="display:none">
      <div id="profErr"  class="alert alert-error"   style="display:none"></div>
      <div id="profOk"   class="alert alert-success" style="display:none"></div>
      <form id="profForm">
        <div class="form-group">
          <label>Full name</label>
          <input type="text" id="profName" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="profEmail" required>
        </div>
        <div class="form-group">
          <label>New password <span style="color:var(--text-muted);font-weight:400">(required to save changes)</span></label>
          <input type="password" id="profPassword" placeholder="Enter your current or new password" required>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button type="submit" class="btn btn-primary">Save changes</button>
          <button type="button" class="btn btn-outline" onclick="toggleEdit()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</main>

<script src="/js/app.js"></script>
<script>
  const user = initNav('profile');
  let editing = false;
  let profile  = null;

  async function load() {
    const res = await API.get(`/users/${user.id}`);
    if (!res || !res.ok) { document.getElementById('profileFields').innerHTML = '<p class="empty">Failed to load profile.</p>'; return; }
    profile = await res.json();
    renderView();
  }

  function renderView() {
    document.getElementById('profileFields').innerHTML = `
      <div class="profile-field">
        <span class="profile-label">Full name</span>
        <span class="profile-value">${esc(profile.name)}</span>
      </div>
      <div class="profile-field">
        <span class="profile-label">Email</span>
        <span class="profile-value">${esc(profile.email)}</span>
      </div>
      <div class="profile-field">
        <span class="profile-label">Role</span>
        <span class="profile-value"><span class="badge ${profile.role === 'ADMIN' ? 'badge-admin' : 'badge-user'}">${profile.role}</span></span>
      </div>`;
  }

  function toggleEdit() {
    editing = !editing;
    document.getElementById('viewCard').style.display  = editing ? 'none' : '';
    document.getElementById('editCard').style.display  = editing ? '' : 'none';
    document.getElementById('editToggle').textContent  = editing ? 'View profile' : 'Edit profile';

    if (editing && profile) {
      document.getElementById('profName').value  = profile.name;
      document.getElementById('profEmail').value = profile.email;
      document.getElementById('profPassword').value = '';
      document.getElementById('profErr').style.display = 'none';
      document.getElementById('profOk').style.display  = 'none';
    }
  }

  document.getElementById('profForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('profErr');
    const ok  = document.getElementById('profOk');
    err.style.display = ok.style.display = 'none';

    const payload = {
      name:     document.getElementById('profName').value.trim(),
      email:    document.getElementById('profEmail').value.trim(),
      password: document.getElementById('profPassword').value,
      role:     profile.role   // keep existing role
    };

    const res = await API.put(`/users/${user.id}`, payload);
    if (!res) return;

    if (res.ok) {
      profile = await res.json();
      // Update session storage with new name/email
      Auth.set({ ...user, name: profile.name, email: profile.email });
      ok.textContent = 'Profile updated successfully.';
      ok.style.display = 'block';
      renderView();
      toast('Profile updated');
    } else {
      err.textContent = await parseError(res);
      err.style.display = 'block';
    }
  });

  load();
</script>
</body>
</html>
